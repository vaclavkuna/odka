# Denní aktualizace kurzů ČNB
# Spouští se každý pracovní den v 15:30 SEČ (13:30 UTC)
# Stáhne aktuální kurzy z webu ČNB a přidá je do kurzy.json na gh-pages

name: Aktualizace kurzů ČNB

on:
  schedule:
    - cron: '30 13 * * 1-5'
  # Lze spustit i ručně přes GitHub Actions záložku
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aktualizuj-kurzy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Stáhnout a aktualizovat kurzy
        run: node stahni-kurzy.js

      - name: Uložit změny
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add kurzy.json
          git diff --staged --quiet || git commit -m "Aktualizace kurzů ČNB $(date '+%d.%m.%Y')"
          git push